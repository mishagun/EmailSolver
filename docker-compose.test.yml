services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: emailsolver
      POSTGRES_PASSWORD: emailsolver
      POSTGRES_DB: emailsolver_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailsolver"]
      interval: 2s
      timeout: 3s
      retries: 10

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    command: ["uv", "run", "pytest", "tests/", "-v", "--tb=short"]
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://emailsolver:emailsolver@postgres:5432/emailsolver_test
    depends_on:
      postgres:
        condition: service_healthy
