services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: postgres -c shared_buffers=64MB -c work_mem=2MB -c maintenance_work_mem=32MB
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    restart: always

  migrations:
    image: ghcr.io/mishagun/emailsolver:latest
    command: ["uv", "run", "alembic", "upgrade", "head"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy

  app:
    image: ghcr.io/mishagun/emailsolver:latest
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 384m
    restart: always

  web:
    image: ghcr.io/mishagun/emailsolver-web:latest
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    mem_limit: 64m
    restart: always

  db-backup:
    image: postgres:16-alpine
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      BACKUP_RETENTION: ${BACKUP_RETENTION:-7}
      BACKUP_INTERVAL: ${BACKUP_INTERVAL:-86400}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="/backups/emailsolver_$${TIMESTAMP}.sql.gz"
          echo "[$${TIMESTAMP}] Starting backup..."
          pg_dump -Fc | gzip > "$${BACKUP_FILE}"
          if [ $$? -eq 0 ]; then
            echo "[$${TIMESTAMP}] Backup saved: $${BACKUP_FILE}"
          else
            echo "[$${TIMESTAMP}] Backup FAILED"
          fi
          ls -1t /backups/emailsolver_*.sql.gz 2>/dev/null | tail -n +$$((BACKUP_RETENTION + 1)) | xargs rm -f 2>/dev/null
          echo "[$${TIMESTAMP}] Sleeping $${BACKUP_INTERVAL}s until next backup..."
          sleep $${BACKUP_INTERVAL}
        done
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 64m
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
