services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: emailsolver
      POSTGRES_PASSWORD: emailsolver
      POSTGRES_DB: emailsolver
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailsolver"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
